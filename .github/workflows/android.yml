name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Find Gradle Project
        id: gradle
        shell: bash
        run: |
          DIR=$(find . -name "gradlew" -type f | head -n 1 | xargs dirname)

          if [ -z "$DIR" ]; then
            echo "No gradlew found!"
            exit 1
          fi

          echo "Found Gradle project at: $DIR"
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Validate and Repair Gradle Wrapper
        working-directory: ${{ steps.gradle.outputs.dir }}
        shell: bash
        run: |
          mkdir -p gradle/wrapper

          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || ! jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "Gradle Wrapper missing or corrupted."

            VERSION="8.14.3"

            if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
              TMP=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed -E 's#.*gradle-([0-9.]+)-.*#\1#')
              if [ ! -z "$TMP" ]; then
                VERSION="$TMP"
              fi
            fi

            curl -L \
            "https://raw.githubusercontent.com/gradle/gradle/v${VERSION}/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Make Gradle Executable
        working-directory: ${{ steps.gradle.outputs.dir }}
        run: chmod +x gradlew

      - name: Show Gradle Version
        working-directory: ${{ steps.gradle.outputs.dir }}
        run: ./gradlew --version

      - name: Clean Project
        working-directory: ${{ steps.gradle.outputs.dir }}
        run: ./gradlew clean --no-daemon

      - name: Build Release APK
        working-directory: ${{ steps.gradle.outputs.dir }}
        run: ./gradlew assembleRelease --stacktrace --refresh-dependencies --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            **/build/outputs/apk/release/*.apk
          if-no-files-found: error
