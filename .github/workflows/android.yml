name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - name: Validate and Repair Gradle Wrapper
        shell: bash
        run: |
          mkdir -p gradle/wrapper

          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || ! jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "Gradle Wrapper JAR is missing or corrupted."

            if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
              VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed -E 's#.*gradle-([0-9.]+)-.*#\1#')
            fi

            if [ -z "$VERSION" ]; then
              VERSION="8.14.3"
            fi

            echo "Downloading Gradle Wrapper v$VERSION"

            curl -L \
              "https://raw.githubusercontent.com/gradle/gradle/v${VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar

            echo "Wrapper repaired."
          else
            echo "Gradle Wrapper OK."
          fi

      - name: Verify Wrapper
        run: |
          ls -la gradle/wrapper
          jar tf gradle/wrapper/gradle-wrapper.jar | head

      - name: Decode or Generate Debug Keystore
        shell: bash
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Generating debug keystore..."
            keytool \
              -genkeypair \
              -v \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Validate Gradle
        run: ./gradlew --version

      - name: Clean Project
        run: ./gradlew clean --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --refresh-dependencies --stacktrace --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
