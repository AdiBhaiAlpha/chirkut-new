name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Validate Gradle Wrapper
        shell: bash
        run: |
          if [ ! -f gradlew ]; then
            echo "::error::gradlew not found."
            exit 1
          fi

          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            echo "::error::gradle-wrapper.properties not found."
            exit 1
          fi

          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || ! jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "Gradle Wrapper JAR missing or corrupted."

            VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed -E 's#.*gradle-([0-9.]+)-.*#\1#')

            if [ -z "$VERSION" ]; then
              VERSION="8.10.2"
            fi

            mkdir -p gradle/wrapper

            curl -L \
              "https://raw.githubusercontent.com/gradle/gradle/v${VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Verify Gradle
        run: ./gradlew --version

      - name: Clean Project
        run: ./gradlew clean --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease \
          --stacktrace \
          --info \
          --refresh-dependencies \
          --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Mapping Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapping
          path: app/build/outputs/mapping
          if-no-files-found: ignore

      - name: Upload Build Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports
            app/build/outputs/logs
          if-no-files-found: ignore
